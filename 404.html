<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · Arsenij Schützer</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0c0c0f;--surface:#141419;--border:#222230;--text:#c8c8d4;
    --text-dim:#6c6c80;--accent:#6ee7a0;--accent-dim:#6ee7a020;
    --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5}
  .wrap{max-width:480px;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
  .avatar{width:120px;height:120px;background:#fff;border-radius:50%;border:3px solid var(--accent);padding:6px;box-shadow:0 0 32px rgba(110,231,160,.25)}
  .code{font-family:var(--mono);font-size:.8rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
  h1{font-family:var(--sans);font-weight:600;font-size:clamp(2rem,6vw,2.75rem);color:#efeffa;line-height:1.15;letter-spacing:-.01em}
  p{color:var(--text-dim);font-size:1rem;max-width:380px}
  a.home{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.85rem;color:var(--text);text-decoration:none;padding:.75rem 1.25rem;border:1px solid var(--border);border-radius:4px;background:var(--surface);transition:all .25s;margin-top:.5rem}
  a.home:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="wrap">
    <img class="avatar" src="avatar-black.png" alt="" width="120" height="120">
    <div class="code">Error 404</div>
    <h1>This page is sleeping</h1>
    <p>The page you're looking for doesn't exist — or maybe the sloth is just too lazy to fetch it.</p>
    <a class="home" href="/">← Back to home</a>
  </div>
</body>
</html>
